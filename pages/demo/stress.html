<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Timeline — stress harness</title>
    <link rel="stylesheet" href="./style.css" />
    <style>
      html, body { height: 100%; }
      body { margin: 0; background: #0f172a; display: flex; flex-direction: column; }
      .tl-dev-header { color: #e5e7eb; font-family: system-ui, sans-serif; padding: 12px 16px; font-size: 14px; display: flex; gap: 12px; align-items: center; }
      .tl-dev-header label { display: flex; gap: 4px; align-items: center; }
      .tl-dev-header input { width: 90px; }
      #timeline { flex: 1; min-height: 0; }
    </style>
  </head>
  <body>
    <div class="tl-dev-header">
      <span>Stress harness</span>
      <label>events <input id="events" type="number" value="2000" step="500" /></label>
      <label>spans <input id="spans" type="number" value="60" step="20" /></label>
      <button id="reload" type="button">Generate</button>
      <span id="stat"></span>
    </div>
    <div id="timeline"></div>
    <!-- Override counts via URL too: ?events=10000&spans=200 -->
    <script type="module">
      import { renderTimelineView } from './view.ts';
      import { generateMockData } from './mock-data.ts';

      const root = document.getElementById('timeline');
      const evIn = document.getElementById('events');
      const spIn = document.getElementById('spans');
      const stat = document.getElementById('stat');

      let seed = 1;
      const params = new URLSearchParams(location.search);
      if (params.has('events')) evIn.value = params.get('events');
      if (params.has('spans')) spIn.value = params.get('spans');

      function run() {
        try {
          const events = Number(evIn.value) || 0;
          const spans = Number(spIn.value) || 0;
          const t0 = performance.now();
          const data = generateMockData({ events, spans, seed: seed++ });
          const t1 = performance.now();
          renderTimelineView(root, data);
          const t2 = performance.now();
          stat.textContent = `gen ${(t1 - t0).toFixed(0)}ms · render ${(t2 - t1).toFixed(0)}ms · ${events} beats`;
          stat.style.color = '#9ca3af';
        } catch (err) {
          console.error(err);
          stat.textContent = 'ERROR: ' + (err && err.message ? err.message : String(err));
          stat.style.color = '#f87171';
        }
      }

      document.getElementById('reload').addEventListener('click', run);
      run();
    </script>
  </body>
</html>
